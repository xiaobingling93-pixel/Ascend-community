
on:
  pull_request:
    actions: ["opened","reopened","synchronize"]
    branches: ["master"]
    exclude_paths: [".gitcode/workflows/*"]
    note: "compile"

codearts:
  ci-label: false

jobs:
  - format-check:
      check:
        name: formatcheck
        uses: shell-action
        run: |
            #!/bin/bash

            # ============================================
            # GitCode门禁检查CI脚本
            # 用于检查org-info.yaml/sig-info.yaml/repo-info.yaml文件的合规性
            # ============================================

            set -e  # 遇到错误立即退出

            # 配置颜色输出
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            BLUE='\033[0;34m'
            NC='\033[0m' # No Color

            log_info() {
                echo -e "${BLUE}[INFO]${NC} $1"
            }

            log_success() {
                echo -e "${GREEN}[SUCCESS]${NC} $1"
            }

            log_warning() {
                echo -e "${YELLOW}[WARNING]${NC} $1"
            }

            log_error() {
                echo -e "${RED}[ERROR]${NC} $1"
            }

            # ============================================
            # 环境变量检查
            # ============================================
            check_env_vars() {
                log_info "检查环境变量..."
                
                local missing_vars=()
                
                # 必需的环境变量
                [ -z "$MERGE_ID" ] && missing_vars+=("MERGE_ID")
                [ -z "$gitcode_token" ] && missing_vars+=("gitcode_token")
                [ -z "$gitcode_zyk_token" ] && missing_vars+=("gitcode_zyk_token")
                [ -z "$gitcode_token" ] && missing_vars+=("gitcode_token")
                [ -z "$name_space" ] && missing_vars+=("name_space")
                [ -z "${community_REPOSITORY_NAME}" ] && community_REPOSITORY_NAME="community"  # 默认值
                
                [ -z "$CI_JOB_URL" ] && CI_JOB_URL="https://gitcode.com/${name_space}/${community_REPOSITORY_NAME}/-/jobs"
                
                if [ ${#missing_vars[@]} -gt 0 ]; then
                    log_error "缺少必需的环境变量: ${missing_vars[*]}"
                    exit 1
                fi
                
                log_info "环境变量检查通过"
                log_info "MERGE_ID: $MERGE_ID"
                log_info "命名空间: $name_space"
                log_info "社区仓库: ${community_REPOSITORY_NAME}"
            }

            # ============================================
            # 准备工作目录
            # ============================================
            setup_workspace() {
                log_info "设置工作目录..."
                
                WORKSPACE="/tmp/gitcode-check-${MERGE_ID}"
                
                # 清理旧的工作目录
                if [ -d "$WORKSPACE" ]; then
                    log_warning "清理旧的工作目录: $WORKSPACE"
                    rm -rf "$WORKSPACE"
                fi
                
                # 创建工作目录
                mkdir -p "$WORKSPACE"
                cd "$WORKSPACE"
                
                log_success "工作目录已创建: $WORKSPACE"
            }

            # ============================================
            # 克隆目标仓库
            # ============================================
            clone_repo() {
                log_info "克隆目标仓库..."
                
                local repo_url="https://${gitcode_username}:${gitcode_token}@gitcode.com/${name_space}/${community_REPOSITORY_NAME}.git"

                log_info "克隆仓库"
                
                # 克隆仓库
                if ! git clone -b "$community_TARGET_BRANCH" "$repo_url" "${community_REPOSITORY_NAME}"; then
                    log_error "克隆仓库失败"
                    exit 1
                fi

                cd "${community_REPOSITORY_NAME}" || {
                    log_error "无法进入目录: ${community_REPOSITORY_NAME}"
                    exit 1
                }
                
                log_info "当前分支: $(git branch --show-current)"
                

                if ! git config user.email "drizzlezyk@163.com"; then
                    log_error "设置Git用户邮箱失败"
                    exit 1
                fi
                
                if ! git config user.name "drizzlezyk"; then
                    log_error "设置Git用户名失败"
                    exit 1
                fi

                # 创建PR分支
                if ! git checkout -b "pr_${MERGE_ID}"; then
                    log_error "创建分支 pr_${MERGE_ID} 失败"
                    exit 1
                fi
                
                # 获取合并请求的分支
                if ! git fetch origin "merge-requests/${MERGE_ID}/head:master-${MERGE_ID}"; then
                    log_error "获取合并请求分支失败"
                    exit 1
                fi
                
                # 合并分支，允许无关历史
                if ! git merge --allow-unrelated-histories --no-edit "master-${MERGE_ID}"; then
                    log_error "合并分支失败"
                    exit 1
                fi
                
                log_info "合并完成"
                log_info "当前工作目录: $(pwd)"
                log_info "当前分支: $(git branch --show-current)"
            }


            # 安装Python依赖
            install_python_deps() {
                local max_retries=3
                local retry_delay=1
                local retry_count=0
                
                log_info "安装Python依赖..."
                
                while [ $retry_count -lt $max_retries ]; do
                    # 尝试使用pip3安装
                    if pip3 install --quiet requests pyyaml; then
                        log_success "Python依赖安装成功"
                        return 0
                    fi
                    
                    log_warning "pip3安装失败，尝试使用pip..."
                    
                    # 尝试使用pip安装
                    if pip install --quiet requests pyyaml; then
                        log_success "Python依赖安装成功"
                        return 0
                    fi
                    
                    retry_count=$((retry_count + 1))
                    
                    if [ $retry_count -lt $max_retries ]; then
                        log_warning "安装失败，第 ${retry_count}/${max_retries} 次重试"
                        
                        # 升级pip工具再重试
                        log_info "尝试升级pip工具..."
                        
                        # 尝试升级pip3
                        if command -v pip3 &>/dev/null; then
                            log_info "升级pip3..."
                            python3 -m pip install --quiet --upgrade pip 2>/dev/null || true
                        fi
                        
                        # 尝试升级pip
                        if command -v pip &>/dev/null; then
                            log_info "升级pip..."
                            python -m pip install --quiet --upgrade pip 2>/dev/null || true
                        fi
                        
                        log_warning "${retry_delay}秒后重试..."
                        sleep $retry_delay
                        # 指数退避增加等待时间
                        retry_delay=$((retry_delay * 2))
                    fi
                done
                
                log_error "安装Python依赖失败，已重试 ${max_retries} 次"
                return 1
            }




            # ============================================
            # 设置Python环境和检查脚本
            # ============================================
            setup_python_env() {
                log_info "设置Python环境和检查脚本..."
                
                # 检查Python3是否可用
                if ! command -v python3 &> /dev/null; then
                    log_error "Python3未安装"
                    exit 1
                fi
                
                cd "$WORKSPACE"
                local repo_url="https://${gitcode_zyk_username}:${gitcode_zyk_token}@gitcode.com/drizzlezyk/community-ci.git"
                if ! git clone -b init-v1 --depth 1 "$repo_url" temp_repo; then
                    log_error "克隆仓库失败"
                    exit 1
                fi

                # 复制需要的文件到当前目录
                cp temp_repo/check.py .
                cp temp_repo/add_comment.py .
                cp temp_repo/ci_tags.py .

                # 清理临时目录
                rm -rf temp_repo

                # 调用函数
                install_python_deps || {
                    log_error "Python依赖安装失败，退出脚本"
                    exit 1
                }

                # 使脚本可执行
                chmod +x check.py
                chmod +x add_comment.py
                chmod +x ci_tags.py
                
                log_success "Python环境和检查脚本设置完成"

                python3 ci_tags.py ${name_space} ${community_REPOSITORY_NAME} ${MERGE_ID} ${gitcode_token} ATDR
                echo "标签修改完成"
            }

            # ============================================
            # 执行门禁检查
            # ============================================
            run_gate_check() {
                log_info "开始执行门禁检查..."
                
                cd "$WORKSPACE"
                
                # 创建输出目录
                mkdir -p output
                cd output
                
                # 构建检查命令
                local check_cmd="python3 ../check.py"
                check_cmd+=" --root ../${community_REPOSITORY_NAME}"
                check_cmd+=" --token ${gitcode_token}"
                check_cmd+=" --namespace ${name_space}"
                check_cmd+=" --project ${community_REPOSITORY_NAME}"
                
                # 添加详细日志
                check_cmd+=" --no-cleanup"  # 保留临时文件以便调试
                
                # 执行检查并捕获输出
                if $check_cmd > check_output.log 2>&1; then
                    log_success "检查执行完成"
                    CHECK_RESULT="success"
                else
                    log_error "检查执行失败"
                    CHECK_RESULT="failure"
                fi

                cat result.md >> check_result.md

                
                # 显示检查结果
                log_info "检查结果:"
                echo "========================================"
                cat check_result.md
                echo "========================================"
                
                # 保存完整的检查日志
                log_info "完整检查日志已保存到: ${WORKSPACE}/output/check_output_full.log"
            }

            # ============================================
            # 处理检查结果
            # ============================================
            process_check_result() {
                log_info "处理检查结果..."
                
                cd "$WORKSPACE/output"
                
                # 读取检查结果
                if [ -f "check_result.md" ]; then
                    CHECK_OUTPUT=$(cat check_result.md)
                else
                    CHECK_OUTPUT="检查结果文件不存在"
                fi
                
                
                # 根据检查结果执行不同操作
                if [ "$CHECK_RESULT" = "success" ]; then
                    log_success "🎉 门禁检查通过！"
                    
                    python3 ../add_comment.py \
                        --owner "$name_space" \
                        --project "${community_REPOSITORY_NAME}" \
                        --pr-number "$MERGE_ID" \
                        --token "$gitcode_token" \
                        --comment "$CHECK_OUTPUT"
                        
                    # 输出成功信息
                    echo "✅ GitCode门禁检查已通过"
                    echo "详情请查看: ${CI_JOB_URL}"
                    
                    python3 ../ci_tags.py ${name_space} ${community_REPOSITORY_NAME} ${MERGE_ID} ${gitcode_token} ATDS
                    echo "标签修改完成"
                    
                else
                    log_error "❌ 门禁检查失败"
                    
                    python3 ../add_comment.py \
                        --owner "$name_space" \
                        --project "${community_REPOSITORY_NAME}" \
                        --pr-number "$MERGE_ID" \
                        --token "$gitcode_token" \
                        --comment "$CHECK_OUTPUT"
                    
                    # 输出失败信息
                    echo "❌ GitCode门禁检查失败"
                    echo "详情请查看: ${CI_JOB_URL}"
                    echo ""
                    echo "检查输出:"
                    echo "$CHECK_OUTPUT"

                    python3 ../ci_tags.py ${name_space} ${community_REPOSITORY_NAME} ${MERGE_ID} ${gitcode_token} ATDF 
                    echo "标签修改完成"

                    exit 1
                fi
            }

            # ============================================
            # 主函数
            # ============================================
            main() {
                log_info "========================================"
                log_info "开始执行GitCode门禁检查"
                log_info "时间: $(date)"
                log_info "========================================"
                
                # 记录开始时间
                local start_time=$(date +%s)
                
                # 执行检查步骤
                check_env_vars
                setup_workspace
                setup_python_env
                clone_repo
                run_gate_check
                process_check_result
                
                # 记录结束时间
                local end_time=$(date +%s)
                local duration=$((end_time - start_time))
                
                log_info "========================================"
                log_info "GitCode门禁检查执行完成"
                log_info "总耗时: ${duration}秒"
                log_info "========================================"
            }

            # ============================================
            # 脚本入口
            # ============================================
            if [ "${BASH_SOURCE[0]}" = "$0" ]; then
                # 设置错误处理
                trap 'log_error "脚本在 $(date) 异常退出"; exit 1' ERR
                
                # 设置信号处理
                trap 'log_warning "收到中断信号，正在退出..."; exit 1' INT TERM
                
                # 执行主函数
                main "$@"
            fi
            